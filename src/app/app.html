<router-outlet></router-outlet>

<!-- Global Toast Container -->
<div class="fixed bottom-4 right-4 z-[9999] flex flex-col-reverse gap-2 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-center gap-3 rounded-xl bg-gray-900 px-4 py-3 text-white shadow-2xl min-w-[260px] max-w-sm"
      style="animation: slideInRight 0.25s ease-out both"
    >
      @if (toast.type === 'error') {
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-red-500/20">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4 text-red-400"
          >
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0ZM8.94 6.94a.75.75 0 1 0-1.061 1.061L9.939 10l-2.06 2.06a.75.75 0 1 0 1.06 1.06L11 11.06l2.06 2.06a.75.75 0 1 0 1.06-1.06L12.06 10l2.06-2.06a.75.75 0 0 0-1.06-1.06L11 8.94l-2.06-2Z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
      } @else if (toast.type === 'info') {
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-blue-500/20">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4 text-blue-400"
          >
            <path
              fill-rule="evenodd"
              d="M18 10a8 8 0 1 1-16 0 8 8 0 0 1 16 0Zm-7-4a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM9 9a.75.75 0 0 0 0 1.5h.253a.25.25 0 0 1 .244.304l-.459 2.066A1.75 1.75 0 0 0 10.747 15H11a.75.75 0 0 0 0-1.5h-.253a.25.25 0 0 1-.244-.304l.459-2.066A1.75 1.75 0 0 0 9.253 9H9Z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
      } @else {
        <div class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-green-500/20">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 20 20"
            fill="currentColor"
            class="size-4 text-green-400"
          >
            <path
              fill-rule="evenodd"
              d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z"
              clip-rule="evenodd"
            />
          </svg>
        </div>
      }
      <span class="text-sm font-medium flex-1">{{ toast.message }}</span>
      <button
        (click)="toastService.remove(toast.id)"
        class="ml-1 text-white/50 transition-colors hover:text-white focus:outline-none"
        aria-label="Dismiss"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          class="size-4"
        >
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z"
          />
        </svg>
      </button>
    </div>
  }
</div>
