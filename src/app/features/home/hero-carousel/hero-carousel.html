<section class="hero-section relative overflow-hidden bg-brand-secondary">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="relative min-h-[70vh] md:min-h-[80vh] flex items-center">
      <!-- Slides -->
      @for (slide of slides(); track $index) {
        <div
          class="slide absolute inset-0 flex items-center transition-opacity duration-700 ease-in-out"
          [class.opacity-100]="$index === currentSlide()"
          [class.opacity-0]="$index !== currentSlide()"
          [class.z-10]="$index === currentSlide()"
          [class.z-0]="$index !== currentSlide()"
        >
          <div
            class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12 items-center w-full px-12 sm:px-16 md:px-20"
          >
            <!-- Text Content -->
            <div class="space-y-6 md:space-y-8">
              <h1
                class="hero-title text-4xl sm:text-5xl md:text-6xl font-bold leading-tight text-brand-accent"
              >
                {{ slide.title }}
              </h1>
              <p class="text-base md:text-lg text-brand-primary/60 max-w-lg">
                {{ slide.subtitle }}
              </p>
              <a
                [routerLink]="slide.ctaLink"
                class="inline-flex items-center px-8 py-3.5 bg-brand-accent text-white text-sm font-medium rounded-xl hover:bg-brand-accent/90 transition-all duration-300 hover:shadow-lg hover:shadow-brand-accent/25"
              >
                {{ slide.cta }}
              </a>
            </div>

            <!-- Image -->
            <div class="hidden lg:flex justify-end">
              <div class="relative w-full max-w-lg">
                <img
                  [src]="slide.image"
                  [alt]="slide.title"
                  class="rounded-2xl object-cover w-full h-400px shadow-2xl"
                />
                <div
                  class="absolute inset-0 rounded-2xl bg-gradient-to-t from-black/10 to-transparent"
                ></div>
              </div>
            </div>
          </div>
        </div>
      }

      <!-- Navigation Arrows -->
      <button
        (click)="prevSlide()"
        class="absolute left-0 sm:left-2 md:left-4 top-1/2 -translate-y-1/2 z-20 w-10 h-10 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center text-brand-accent hover:bg-white transition-colors shadow-md"
        aria-label="Previous slide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
      <button
        (click)="nextSlide()"
        class="absolute right-0 sm:right-2 md:right-4 top-1/2 -translate-y-1/2 z-20 w-10 h-10 rounded-full bg-white/80 backdrop-blur-sm flex items-center justify-center text-brand-accent hover:bg-white transition-colors shadow-md"
        aria-label="Next slide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>

    <!-- Dots Indicator -->
    <div class="flex items-center justify-center gap-2.5 pb-8 -mt-4 relative z-20">
      @for (slide of slides(); track $index) {
        <button
          (click)="goToSlide($index)"
          class="w-2.5 h-2.5 rounded-full transition-all duration-300"
          [class]="
            $index === currentSlide()
              ? 'bg-brand-accent w-8'
              : 'bg-brand-accent/30 hover:bg-brand-accent/50'
          "
          [attr.aria-label]="'Go to slide ' + ($index + 1)"
        ></button>
      }
    </div>
  </div>
</section>
