<div class="bg-white rounded-2xl shadow-[0_1px_3px_rgba(0,0,0,0.08),0_4px_16px_rgba(0,0,0,0.06)] p-7 sticky top-6">
    <h3 class="font-bold text-[1.05rem] text-[#1a1a2e] mb-4">Order Summary</h3>

    <div class="flex justify-between text-[0.875rem] py-1.5">
        <span class="text-[#1a1a2e]/55">Subtotal ({{ itemCount() }} items)</span>
        <span class="font-medium text-[#1a1a2e]">{{ cart().totalPrice | currency }}</span>
    </div>

    @if (cart().discountAmount > 0) {
    <div class="flex justify-between text-[0.875rem] py-1.5">
        <span class="text-green-600">Discount</span>
        <span class="font-semibold text-green-600">-{{ cart().discountAmount | currency }}</span>
    </div>
    }

    <div class="flex justify-between text-[0.875rem] py-1.5">
        <span class="text-[#1a1a2e]/55">Shipping</span>
        <span class="font-semibold text-green-600">Free</span>
    </div>

    @if (cart().appliedCoupon) {
    <div class="flex justify-between text-[0.875rem] py-1.5">
        <span class="text-green-600">Coupon applied</span>
        <span class="text-green-600">✓</span>
    </div>
    }

    <hr class="border-gray-100 my-3.5" />

    <div class="flex justify-between items-center">
        <span class="font-bold text-[1rem] text-[#1a1a2e]">Total</span>
        <span class="font-black text-[1.2rem] text-[#1a1a2e]">{{ cart().finalPrice | currency }}</span>
    </div>
</div>
