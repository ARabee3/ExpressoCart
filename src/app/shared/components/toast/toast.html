@if (toast.toasts().length > 0) {
  <div
    class="fixed bottom-6 right-6 flex flex-col gap-3 z-9999 pointer-events-none"
    role="region"
    aria-label="Notifications"
  >
    @for (t of toast.toasts(); track t.id) {
      <div
        class="toast-enter flex items-start gap-3 bg-white shadow-xl rounded-xl border-l-4 px-4 py-3 w-80 pointer-events-auto"
        [ngClass]="borderFor(t.type)"
        role="alert"
      >
        <span
          class="flex items-center justify-center w-6 h-6 rounded-full text-white text-xs font-black shrink-0 mt-0.5"
          [ngClass]="iconBgFor(t.type)"
          >{{ iconFor(t.type) }}</span
        >

        <p class="text-sm font-medium text-gray-800 flex-1 leading-snug">{{ t.message }}</p>

        <button
          (click)="toast.dismiss(t.id)"
          class="text-gray-300 hover:text-gray-600 transition-colors ml-1 text-base leading-none shrink-0"
          aria-label="Dismiss"
        >
          ✕
        </button>
      </div>
    }
  </div>
}
