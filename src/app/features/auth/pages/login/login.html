<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
  <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
    <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Welcome Back</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
      <div>
        <input
          type="email"
          placeholder="Email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500" 
        />

        <div *ngIf="loginForm.get('email')?.touched">
          <small
            class="error"
            *ngIf="loginForm.get('email')?.errors?.['required']"
            class="text-red-500 text-sm mt-1"
          >
            Email is required
          </small>

          <small
            class="error"
            *ngIf="loginForm.get('email')?.errors?.['pattern']"
            class="text-red-500 text-sm mt-1"
          >
            Invalid email format
          </small>
        </div>
      </div>

      <div>
        <input
          type="password"
          placeholder="Password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500"
        />

        <div *ngIf="loginForm.get('password')?.touched">
          <small
            class="error"
            *ngIf="loginForm.get('password')?.errors?.['required']"
            class="text-red-500 text-sm mt-1"
          >
            Password is required
          </small>
        </div>
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-brand-accent text-white py-2 rounded-lg hover:bg-brand-accent/90 transition disabled:bg-gray-400 disabled:cursor-not-allowed"
      >
        Login
      </button>
      <p class="text-center text-sm text-gray-600">
        Don't have an account?
        <a routerLink="/register" class="text-brand-accent hover:underline"> Register </a>
      </p>
    </form>
  </div>
</div>
