
<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl shadow-lg">
        <h2 class="text-2xl font-bold text-center text-brand-accent mb-6">
      Create Account
    </h2>

<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
  <!-- Name -->
  <div>
    <input type="text" placeholder="Full Name" formControlName="name" class="input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500" />

    <div *ngIf="registerForm.get('name')?.touched">
      <small class="error" *ngIf="registerForm.get('name')?.errors?.['required']" class="text-red-500 text-sm mt-1">
        Name is required
      </small>

      <small class="error" *ngIf="registerForm.get('name')?.errors?.['minlength']" class="text-red-500 text-sm mt-1">
        Minimum 3 characters
      </small>
    </div>
  </div>

  <!-- Email -->
  <div>
    <input type="email" placeholder="Email" formControlName="email" class="input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500" />

    <div *ngIf="registerForm.get('email')?.touched">
      <small class="error" *ngIf="registerForm.get('email')?.errors?.['required']" class="text-red-500 text-sm mt-1">
        Email is required
      </small>

      <small class="error" *ngIf="registerForm.get('email')?.errors?.['pattern']" class="text-red-500 text-sm mt-1">
        Invalid email format
      </small>
    </div>
  </div>

  <!-- Phone -->
  <div>
    <input type="text" placeholder="Phone" formControlName="phone" class="input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500" />

    <div *ngIf="registerForm.get('phone')?.touched">
      <small class="error" *ngIf="registerForm.get('phone')?.errors?.['required']" class="text-red-500 text-sm mt-1">
        Phone is required
      </small>

      <small class="error" *ngIf="registerForm.get('phone')?.errors?.['pattern']" class="text-red-500 text-sm mt-1">
        Invalid Egyptian phone number
      </small>
    </div>
  </div>

  <!-- Password -->
  <div>
    <input type="password" placeholder="Password" formControlName="password" class="input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500" />

    <div *ngIf="registerForm.get('password')?.touched">
      <small class="error" *ngIf="registerForm.get('password')?.errors?.['required']" class="text-red-500 text-sm mt-1">
        Password is required
      </small>

      <small class="error" *ngIf="registerForm.get('password')?.errors?.['pattern']" class="text-red-500 text-sm mt-1">
        Must contain upper, lower, number, special char
      </small>
    </div>
  </div>

  <!-- Confirm Password -->
  <div>
    <input
      type="password"
      placeholder="Confirm Password"
      formControlName="confirmPassword"
      class="input w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder:text-gray-500"
    />

    <div *ngIf="registerForm.get('confirmPassword')?.touched">
      <small class="error" *ngIf="registerForm.get('confirmPassword')?.errors?.['required']" class="text-red-500 text-sm mt-1">
        Confirm password is required
      </small>
      <small
        class="error"
        *ngIf="
          registerForm.errors?.['passwordMismatch'] && registerForm.get('confirmPassword')?.touched
        "
        class="text-red-500 text-sm mt-1"
      >
        Passwords do not match
      </small>
    </div>
  </div>

  <button type="submit" [disabled]="registerForm.invalid" class="btn w-full bg-brand-accent text-white py-2 rounded-lg
                     hover:bg-brand-accent/90 transition
                     disabled:bg-gray-400 disabled:cursor-not-allowed">Register</button>
</form>
<p class="text-center text-sm text-gray-600">
        Already have an account?
        <a routerLink="/login" class="text-brand-accent hover:underline">
          Login
        </a>
      </p>
</div>
</div>
